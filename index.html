<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <script>
      // Desativa o zoom de pinça (pinch-to-zoom) no Safari iOS e navegadores móveis
      document.addEventListener('gesturestart', function (e) {
        e.preventDefault();
      }, { passive: false });
      
      document.addEventListener('gesturechange', function (e) {
        e.preventDefault();
      }, { passive: false });

      // Opcional: previne zoom no duplo toque em botões/inputs se necessário
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function (e) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          // Previne comportamento padrão de zoom em toques rápidos sucessivos (double tap zoom)
          // Mas garante que focos em botões e inputs comuns continuem operando normalmente
          if (e.target && (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT' && e.target.tagName !== 'TEXTAREA')) {
            e.preventDefault();
          }
        }
        lastTouchEnd = now;
      }, { passive: false });
    </script>
